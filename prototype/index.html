<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DIKWP-PACT Dashboard</title>
<style>
:root{--bg:#07111f;--panel:#0f2035;--text:#e9f1fb;--muted:#a9b8cc;--line:#28415e;--accent:#5fc6ff;--good:#8de2a7;--warn:#ffd277;--bad:#ff8f8f}
*{box-sizing:border-box} body{margin:0;font-family:Inter,"Noto Sans CJK SC",system-ui,sans-serif;background:linear-gradient(135deg,#07111f,#102844);color:var(--text)}
header{padding:28px 5vw 18px;border-bottom:1px solid var(--line)} h1{margin:0;font-size:30px} .sub{color:var(--muted);margin-top:8px}
main{padding:22px 5vw 60px} .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px} .card{background:rgba(15,32,53,.93);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.18)}
.metric{font-size:30px;font-weight:700;margin-top:6px} table{width:100%;border-collapse:collapse} th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;font-size:13px} th{color:#cbe8ff}
select,input{background:#0b192b;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:9px} .controls{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}
.badge{display:inline-block;padding:3px 8px;border-radius:999px;background:#19344f;color:#c9e9ff;font-size:12px} .risk{color:var(--bad)} .control{color:var(--good)}
.bar{height:8px;background:#172d45;border-radius:8px;overflow:hidden;margin-top:6px} .fill{height:100%;background:linear-gradient(90deg,#3daeff,#8de2a7)}
pre{white-space:pre-wrap;background:#081522;border:1px solid var(--line);padding:12px;border-radius:10px;color:#d8e9f8;max-height:360px;overflow:auto}
small{color:var(--muted)}
</style></head><body>
